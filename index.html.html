<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: linear-gradient(135deg, #FFFBEB 0%, #FFF7ED 50%, #FFF1F2 100%);
    min-height: 100vh;
    color: #1F2937;
  }
  .app { max-width: 900px; margin: 0 auto; min-height: 100vh; }
  
  /* Header */
  .header { padding: 28px 24px 0; display: flex; justify-content: space-between; align-items: center; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 26px; font-weight: 800; color: #78350F; letter-spacing: -0.5px; cursor: pointer; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(120,53,15,0.08); color: #78350F; border: none; border-radius: 12px;
    padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; transition: all 0.2s; font-family: inherit;
  }
  .icon-btn:hover { background: rgba(120,53,15,0.15); }
  .icon-btn.active { background: #78350F; color: #FFF; }
  .badge-wrap { position: relative; }
  .badge {
    background: #DC2626; color: #FFF; font-size: 10px; font-weight: 700; border-radius: 50%;
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    position: absolute; top: -4px; right: -4px;
  }

  /* Search */
  .search-bar { margin: 20px 24px 0; position: relative; }
  .search-bar svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }
  .search-input {
    width: 100%; padding: 14px 16px 14px 44px; border: 2px solid transparent; border-radius: 16px;
    font-size: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
    outline: none; color: #1F2937; font-family: inherit; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #D97706; }

  /* Categories */
  .categories { display: flex; gap: 8px; padding: 16px 24px; overflow-x: auto; scrollbar-width: none; }
  .categories::-webkit-scrollbar { display: none; }
  .cat-pill {
    padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: none;
    cursor: pointer; white-space: nowrap; background: rgba(255,255,255,0.7); color: #6B7280;
    transition: all 0.2s; flex-shrink: 0; font-family: inherit;
  }
  .cat-pill.active { background: #78350F; color: #FFF; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 8px 24px 100px; }
  .card {
    background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-radius: 20px;
    padding: 20px; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    border: 1px solid rgba(0,0,0,0.04); position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 20px 20px 0 0; }
  .card-badge {
    display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .card-title { font-size: 18px; font-weight: 700; color: #1F2937; margin-bottom: 6px; line-height: 1.3; }
  .card-desc { font-size: 13px; color: #6B7280; line-height: 1.5; margin-bottom: 12px; }
  .card-meta { display: flex; gap: 14px; font-size: 12px; color: #9CA3AF; align-items: center; }
  .meta-item { display: flex; align-items: center; gap: 4px; }

  /* Detail */
  .detail-container { padding: 0 24px 100px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px; background: none; border: none;
    color: #78350F; font-size: 14px; font-weight: 600; cursor: pointer; padding: 20px 0; font-family: inherit;
  }
  .detail-title { font-size: 32px; font-weight: 800; color: #1F2937; line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.5px; }
  .detail-desc { font-size: 15px; color: #6B7280; line-height: 1.6; margin-bottom: 16px; }
  .meta-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 4px; }
  .meta-chip {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    background: rgba(255,255,255,0.8); border-radius: 12px; font-size: 13px; font-weight: 600; color: #4B5563;
  }
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 16px; font-weight: 700; color: #78350F; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 14px;
  }

  /* Ingredients with checkboxes */
  .ing-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s;
  }
  .ing-check {
    width: 20px; height: 20px; border-radius: 5px; border: 2px solid #D1D5DB;
    background: transparent; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .ing-check.checked { border: none; background: #78350F; }
  .ing-name { flex: 1; font-size: 15px; color: #374151; transition: all 0.2s; }
  .ing-amount { font-weight: 600; color: #78350F; font-size: 15px; transition: all 0.2s; }
  .ing-row.checked .ing-name { color: #9CA3AF; text-decoration: line-through; text-decoration-thickness: 1px; }
  .ing-row.checked .ing-amount { color: #C4A882; text-decoration: line-through; text-decoration-thickness: 1px; }

  /* Steps */
  .step-item {
    display: flex; gap: 14px; padding: 14px 16px; margin-bottom: 8px;
    background: rgba(255,255,255,0.7); border-radius: 14px; cursor: pointer;
    transition: all 0.2s; align-items: flex-start; border: 1px solid transparent;
  }
  .step-item.done { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;
    background: #78350F; color: #FFF; margin-top: 1px;
  }
  .step-item.done .step-num { background: #10B981; }
  .step-text { font-size: 15px; line-height: 1.6; color: #374151; flex: 1; }
  .step-item.done .step-text { color: #6B7280; text-decoration: line-through; }

  /* Progress bar */
  .progress-bar { height: 6px; background: rgba(0,0,0,0.06); border-radius: 3px; }
  .progress-fill { height: 6px; border-radius: 3px; transition: width 0.4s ease; }

  /* Buttons */
  .action-btns { display: flex; gap: 10px; margin-top: 16px; }
  .print-btn {
    display: flex; align-items: center; gap: 6px; background: rgba(120,53,15,0.08);
    color: #78350F; border: none; border-radius: 12px; padding: 10px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .delete-btn {
    display: flex; align-items: center; gap: 6px; background: rgba(239,68,68,0.08);
    color: #DC2626; border: none; border-radius: 12px; padding: 10px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  }

  /* Form */
  .form-container { padding: 0 24px 100px; }
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 700; color: #78350F;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 12px 14px; border: 2px solid rgba(0,0,0,0.06); border-radius: 12px;
    font-size: 14px; background: rgba(255,255,255,0.8); outline: none; color: #1F2937;
    font-family: inherit; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: #D97706; }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-select { padding: 12px 14px; border: 2px solid rgba(0,0,0,0.06); border-radius: 12px; font-size: 14px; background: rgba(255,255,255,0.8); outline: none; color: #1F2937; cursor: pointer; font-family: inherit; }
  .row-flex { display: flex; gap: 12px; }
  .ing-form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .small-input {
    padding: 10px 12px; border: 2px solid rgba(0,0,0,0.06); border-radius: 10px;
    font-size: 14px; background: rgba(255,255,255,0.8); outline: none; color: #1F2937; font-family: inherit;
  }
  .small-input:focus { border-color: #D97706; }
  .remove-btn {
    background: rgba(239,68,68,0.08); color: #EF4444; border: none; border-radius: 8px;
    width: 32px; height: 38px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 18px; font-family: inherit;
  }
  .add-field-btn {
    background: rgba(120,53,15,0.06); color: #78350F; border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 4px; font-family: inherit;
  }
  .save-btn {
    background: #78350F; color: #FFF; border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
    width: 100%; margin-top: 8px; font-family: inherit;
  }
  .save-btn:disabled { opacity: 0.4; cursor: default; }

  /* Shopping */
  .shop-recipe-card {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; margin-bottom: 8px;
    background: rgba(255,255,255,0.7); border-radius: 14px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
  }
  .shop-recipe-card.selected { background: rgba(120,53,15,0.08); border-color: #78350F; }
  .shop-checkbox {
    width: 22px; height: 22px; border-radius: 6px; border: 2px solid #D1D5DB;
    background: transparent; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .shop-checkbox.checked { border: none; background: #78350F; }
  .shop-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin-bottom: 4px;
    background: rgba(255,255,255,0.6); border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .shop-item.checked { background: rgba(16,185,129,0.06); }
  .shop-item-check {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D1D5DB;
    background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .shop-item.checked .shop-item-check { border: none; background: #10B981; }
  .shop-item-text { font-size: 14px; color: #374151; flex: 1; }
  .shop-item.checked .shop-item-text { color: #9CA3AF; text-decoration: line-through; }
  .shop-from { font-size: 12px; font-weight: 700; color: #78350F; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .generate-btn {
    background: #78350F; color: #FFF; border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
    width: 100%; margin-top: 12px; margin-bottom: 24px; font-family: inherit;
  }
  .generate-btn:disabled { opacity: 0.4; cursor: default; }

  /* Print preview */
  .print-preview-container { padding: 0 24px 100px; }
  .print-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .print-title { font-size: 22px; font-weight: 800; color: #1F2937; letter-spacing: -0.5px; }
  .print-go-btn {
    background: #78350F; color: #FFF; border: none; border-radius: 12px;
    padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-family: inherit;
  }
  .print-frame-wrap {
    background: #FFF; border-radius: 12px; border: 1px solid #E5E7EB;
    overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .print-frame-wrap iframe { width: 100%; height: 680px; border: none; }
  .print-tip { font-size: 12px; color: #9CA3AF; text-align: center; margin-top: 12px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: #9CA3AF; }

  /* Hide views */
  .view { display: none; }
  .view.active { display: block; }

  /* SVG icons inline */
  svg { vertical-align: middle; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo" onclick="showView('home')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      My Recipe Book
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="shop-btn" onclick="showView('shopping')">
        <span class="badge-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="badge" id="shop-badge" style="display:none">0</span>
        </span>
        Shop
      </button>
      <button class="icon-btn" id="add-btn" onclick="showView('add')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Add
      </button>
    </div>
  </div>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" placeholder="Search recipes or ingredients..." oninput="filterRecipes()">
    </div>
    <div class="categories" id="categories"></div>
    <div class="grid" id="recipe-grid"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail"></div>

  <!-- ADD VIEW -->
  <div class="view" id="view-add"></div>

  <!-- SHOPPING VIEW -->
  <div class="view" id="view-shopping"></div>

  <!-- PRINT VIEW -->
  <div class="view" id="view-print"></div>
</div>

<script>
// ============================================================
//  RECIPE DATA — ADD NEW RECIPES HERE!
//  Just copy one of the objects below and fill in your info.
// ============================================================
let recipes = [
  {
    id: 1,
    title: "Classic Marinara Sauce",
    category: "Sauces",
    prepTime: "10 min",
    cookTime: "30 min",
    servings: 4,
    description: "A simple, rich tomato sauce perfect over pasta or as a pizza base.",

      { amount: "4 cloves", item: "garlic, minced" },
      { amount: "1 can (28 oz)", item: "crushed tomatoes" },

      { amount: "1 tsp", item: "dried basil" },

      { amount: "1 tsp", item: "sugar" },
    ],
    steps: [
      "Heat olive oil in a saucepan over medium heat.",
      "Add minced garlic and sauté for 1 minute until fragrant.",
      "Pour in crushed tomatoes, oregano, basil, salt, pepper, and sugar.",
      "Stir well and bring to a simmer.",
      "Reduce heat to low and cook for 25 minutes, stirring occasionally.",
      "Taste and adjust seasoning. Serve over your favorite pasta.",
    ],
  },
  {
    id: 2,
    title: "Honey Garlic Chicken Thighs",
    category: "Main Dishes",
    prepTime: "15 min",
    cookTime: "25 min",
    servings: 4,
    description: "Juicy chicken thighs glazed with a sweet and savory honey garlic sauce.",
    ingredients: [
      { amount: "8", item: "bone-in chicken thighs" },
      { amount: "⅓ cup", item: "honey" },
      { amount: "¼ cup", item: "soy sauce" },
      { amount: "3 cloves", item: "garlic, minced" },
      { amount: "1 tbsp", item: "olive oil" },

      { amount: "½ tsp", item: "black pepper" },

      "Flip chicken, pour honey garlic sauce over the thighs.",
      "Transfer skillet to oven and bake for 20–25 minutes until internal temp reaches 165°F.",
      "Garnish with sesame seeds and serve with rice or vegetables.",
    ],
  },
  {
    id: 3,
    title: "Beef Snacks",
    category: "Snacks",

    servings: 8,

    ingredients: [

      { amount: "1 lb", item: "ground pork" },
      { amount: "1 tbsp", item: "sea salt" },
      { amount: "½ tbsp", item: "seasoned salt" },
      { amount: "1 tbsp", item: "granulated garlic" },
      { amount: "1 tbsp", item: "granulated onion powder" },

      "Season with 3 big pinches of salt and 2 teaspoons of crushed red pepper. Stir to combine.",
      "Let the sauce simmer on low for 30 minutes, stirring occasionally.",
      "Taste the sauce. If it needs more salt, add salt to taste. If it's too acidic, add ¼ teaspoon of baking soda — do NOT use sugar.",

      "Serve over your favorite pasta — pappardelle or casarecce are the best picks.",

  {
    id: 5,
    title: "Cherry Lime Slushy",
    category: "Drinks",

      { amount: "½ cup", item: "freshly squeezed lime juice" },
      { amount: "½ cup", item: "water, seltzer, or soda" },
      { amount: "¼ tsp", item: "kosher salt" },
      { amount: "8 drops", item: "orange bitters (optional)" },
      { amount: "2 cups", item: "ice" },
      { amount: "", item: "lime wedges, for serving" },

    steps: [
      "Make a simple syrup: add ¼ cup water and ¼ cup sugar to a saucepan. Stir occasionally and bring the mixture to a boil on high.",

  {
    id: 6,

let selectedForShopping = new Set();
let shoppingList = [];
let checkedShopItems = new Set();
let checkedIngredients = new Set();
let completedSteps = new Set();
let currentView = "home";

function getColor(cat) { return categoryColors[cat] || defaultColor; }
function checkSvg() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>'; }
function clockSvg() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'; }
function servSvg() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>'; }
function printSvg() { return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'; }

// ============================================================
//  VIEWS
// ============================================================
function showView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('shop-btn').classList.toggle('active', name === 'shopping');
  document.getElementById('add-btn').classList.toggle('active', name === 'add');
  if (name === 'home') renderHome();
  if (name === 'add') renderAddForm();
  if (name === 'shopping') renderShopping();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ============================================================
//  HOME
// ============================================================
function renderHome() {
  // Categories
  const catDiv = document.getElementById('categories');
  catDiv.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-pill ${activeCategory===c?'active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
  filterRecipes();
}

function setCategory(cat) {
  activeCategory = cat;
  renderHome();
}

function filterRecipes() {
  const q = document.querySelector('.search-input')?.value.toLowerCase() || '';
  const filtered = recipes.filter(r => {
    const matchSearch = r.title.toLowerCase().includes(q) || r.ingredients.some(i => i.item.toLowerCase().includes(q));
    const matchCat = activeCategory === 'All' || r.category === activeCategory;
    return matchSearch && matchCat;
  });
  const grid = document.getElementById('recipe-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p style="font-size:40px;margin-bottom:8px">📖</p><p style="font-size:16px;font-weight:600;margin-bottom:4px">No recipes found</p><p style="font-size:13px">Try a different search or add a new recipe!</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(r => {
    const c = getColor(r.category);
    return `<div class="card" onclick="openRecipe(${r.id})">
      <div class="card-accent" style="background:${c.accent}"></div>
      <span class="card-badge" style="background:${c.bg};color:${c.text}">${r.category}</span>
      <div class="card-title">${r.title}</div>
      <div class="card-desc">${r.description}</div>
      <div class="card-meta">
        ${r.prepTime ? `<span class="meta-item">${clockSvg()} ${r.prepTime} prep</span>` : ''}
        ${r.cookTime ? `<span class="meta-item">${clockSvg()} ${r.cookTime} cook</span>` : ''}
        <span class="meta-item">${servSvg()} ${r.servings}</span>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
//  DETAIL
// ============================================================
function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  checkedIngredients = new Set();
  completedSteps = new Set();
  renderDetail(r);
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderDetail(r) {
  const c = getColor(r.category);
  const el = document.getElementById('view-detail');
  el.innerHTML = `<div class="detail-container">
    <button class="back-btn" onclick="showView('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg> Back to recipes
    </button>
    <span class="card-badge" style="background:${c.bg};color:${c.text}">${r.category}</span>
    <div class="detail-title">${r.title}</div>
    <div class="detail-desc">${r.description}</div>
    <div class="meta-row">
      ${r.prepTime ? `<div class="meta-chip">${clockSvg()} ${r.prepTime} prep</div>` : ''}
      ${r.cookTime ? `<div class="meta-chip">${clockSvg()} ${r.cookTime} cook</div>` : ''}
      <div class="meta-chip">${servSvg()} Serves ${r.servings}</div>
    </div>
    <div style="margin:20px 0 28px" id="progress-wrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:#6B7280">Progress</span>
        <span style="font-size:12px;font-weight:700;color:#78350F" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%;background:#D97706"></div></div>
    </div>
    <div class="section">
      <div class="section-title">Ingredients</div>
      <div id="ing-list">${r.ingredients.map((ing, i) => `
        <div class="ing-row" id="ing-${i}" onclick="toggleIng(${i})">
          <div class="ing-check" id="ing-check-${i}">&nbsp;</div>
          <span class="ing-name">${ing.item}</span>
          <span class="ing-amount">${ing.amount}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-title">Directions</div>
      ${r.steps.map((step, i) => `
        <div class="step-item" id="step-${i}" onclick="toggleStep(${r.id},${i})">
          <div class="step-num" id="step-num-${i}">${i+1}</div>
          <div class="step-text">${step}</div>
        </div>`).join('')}
    </div>
    <div class="action-btns">
      <button class="print-btn" onclick="openPrint(${r.id})">${printSvg()} Print Recipe</button>
      <button class="delete-btn" onclick="deleteRecipe(${r.id})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete Recipe
      </button>
    </div>
  </div>`;
}

function toggleIng(i) {
  if (checkedIngredients.has(i)) checkedIngredients.delete(i); else checkedIngredients.add(i);
  const row = document.getElementById('ing-'+i);
  const check = document.getElementById('ing-check-'+i);
  row.classList.toggle('checked', checkedIngredients.has(i));
  check.classList.toggle('checked', checkedIngredients.has(i));
  check.innerHTML = checkedIngredients.has(i) ? checkSvg() : '&nbsp;';
}

function toggleStep(recipeId, i) {
  const r = recipes.find(x => x.id === recipeId);
  if (completedSteps.has(i)) completedSteps.delete(i); else completedSteps.add(i);
  const el = document.getElementById('step-'+i);
  const num = document.getElementById('step-num-'+i);
  el.classList.toggle('done', completedSteps.has(i));
  num.innerHTML = completedSteps.has(i) ? checkSvg() : (i+1);
  const pct = r ? Math.round((completedSteps.size / r.steps.length) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct === 100 ? '#10B981' : '#D97706';
}

function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  recipes = recipes.filter(r => r.id !== id);
  showView('home');
}

// ============================================================
//  PRINT
// ============================================================
function openPrint(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  const ingCols = r.ingredients.length > 8;
  const manySteps = r.steps.length > 8;
  const ingHtml = r.ingredients.map(ing =>
    `<div class="ing-item"><span class="ing-box"></span><span class="ing-name">${ing.item}</span><span class="ing-amount">${ing.amount}</span></div>`
  ).join('');
  const stepsHtml = r.steps.map((s,i) =>
    `<div class="step"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`
  ).join('');

  const html = `<!DOCTYPE html><html><head><style>
    @page{size:letter;margin:0.5in 0.6in}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;font-size:${manySteps?'9.5pt':'10.5pt'};line-height:1.45}
    .header{border-bottom:2px solid #78350F;padding-bottom:8px;margin-bottom:10px}
    .title{font-size:22pt;font-weight:bold;color:#78350F;letter-spacing:-0.5px}
    .desc{font-style:italic;color:#666;font-size:9.5pt;margin-top:3px}
    .meta{display:flex;gap:18px;margin-top:6px;font-size:9pt;color:#555;font-weight:bold}
    .section-title{font-size:11pt;font-weight:bold;color:#78350F;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;border-bottom:1px solid #ddd;padding-bottom:3px}
    .ingredients{margin-bottom:12px}
    .ing-grid{${ingCols?'column-count:2;column-gap:20px;':''}}
    .ing-item{display:flex;align-items:center;gap:6px;padding:2.5px 0;border-bottom:1px dotted #e0e0e0;break-inside:avoid}
    .ing-box{width:11px;height:11px;border:1.5px solid #999;border-radius:2px;flex-shrink:0}
    .ing-name{flex:1}.ing-amount{font-weight:bold;color:#78350F;white-space:nowrap}
    .steps{margin-top:10px}
    .step{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start}
    .step-num{background:#78350F;color:white;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8.5pt;font-weight:bold;flex-shrink:0;margin-top:1px}
    .step-text{flex:1}
    .footer{margin-top:16px;padding-top:8px;border-top:1px solid #ddd;font-size:8pt;color:#999;text-align:center}
  </style></head><body>
    <div class="header"><div class="title">${r.title}</div>
    ${r.description?`<div class="desc">${r.description}</div>`:''}
    <div class="meta">${r.prepTime?`<span>Prep: ${r.prepTime}</span>`:''}${r.cookTime?`<span>Cook: ${r.cookTime}</span>`:''}<span>Serves: ${r.servings}</span><span>${r.category}</span></div></div>
    <div class="ingredients"><div class="section-title">Ingredients</div><div class="ing-grid">${ingHtml}</div></div>
    <div class="steps"><div class="section-title">Directions</div>${stepsHtml}</div>
    <div class="footer">My Recipe Book</div>
  </body></html>`;

  const el = document.getElementById('view-print');
  el.innerHTML = `<div class="print-preview-container">
    <button class="back-btn" onclick="openRecipe(${r.id})">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg> Back to recipe
    </button>
    <div class="print-header">
      <div class="print-title">Print Preview</div>
      <button class="print-go-btn" onclick="doPrint()">${printSvg()} Print / Save PDF</button>
    </div>
    <div class="print-frame-wrap">
      <iframe id="print-frame" title="Print Preview"></iframe>
    </div>
    <p class="print-tip">Tip: In the print dialog, select "Save as PDF" as your printer to save a PDF file. Set margins to default or minimum.</p>
  </div>`;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el.classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});

  setTimeout(() => {
    const iframe = document.getElementById('print-frame');
    iframe.srcdoc = html;
  }, 50);
}

function doPrint() {
  const iframe = document.getElementById('print-frame');
  if (iframe) { iframe.contentWindow.focus(); iframe.contentWindow.print(); }
}

// ============================================================
//  ADD RECIPE FORM
// ============================================================
let formIngredients = [{amount:'',item:''}];
let formSteps = [''];

function renderAddForm() {
  formIngredients = [{amount:'',item:''}];
  formSteps = [''];
  rebuildAddForm();
}

function rebuildAddForm() {
  const el = document.getElementById('view-add');
  el.innerHTML = `<div class="form-container">
    <button class="back-btn" onclick="showView('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg> Back
    </button>
    <div style="font-size:26px;font-weight:800;color:#1F2937;margin-bottom:24px;letter-spacing:-0.5px">Add New Recipe</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="f-title" placeholder="Recipe name...">
    </div>
    <div class="row-flex" style="margin-bottom:18px">
      <div style="flex:1"><label class="form-label">Category</label>
        <select class="form-select" id="f-category">${CATEGORIES.filter(c=>c!=='All').map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <div style="flex:1"><label class="form-label">Servings</label>
        <input class="form-input" id="f-servings" type="number" min="1" value="4">
      </div>
    </div>
    <div class="row-flex" style="margin-bottom:18px">
      <div style="flex:1"><label class="form-label">Prep Time</label><input class="form-input" id="f-prep" placeholder="e.g. 15 min"></div>
      <div style="flex:1"><label class="form-label">Cook Time</label><input class="form-input" id="f-cook" placeholder="e.g. 30 min"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input form-textarea" id="f-desc" placeholder="Brief description..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Ingredients</label>
      <div id="f-ing-list">${formIngredients.map((ing,i) => ingFieldHtml(i)).join('')}</div>
      <button class="add-field-btn" onclick="addIngField()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add ingredient
      </button>
    </div>
    <div class="form-group">
      <label class="form-label">Steps</label>
      <div id="f-step-list">${formSteps.map((s,i) => stepFieldHtml(i)).join('')}</div>
      <button class="add-field-btn" onclick="addStepField()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add step
      </button>
    </div>
    <button class="save-btn" onclick="saveRecipe()">Save Recipe</button>
  </div>`;
}

function ingFieldHtml(i) {
  return `<div class="ing-form-row">
    <input class="small-input" style="width:100px" placeholder="Amount" id="f-ing-amt-${i}" value="${formIngredients[i]?.amount||''}" oninput="formIngredients[${i}].amount=this.value">
    <input class="small-input" style="flex:1" placeholder="Ingredient" id="f-ing-item-${i}" value="${formIngredients[i]?.item||''}" oninput="formIngredients[${i}].item=this.value">
    ${formIngredients.length > 1 ? `<button class="remove-btn" onclick="removeIngField(${i})">×</button>` : ''}
  </div>`;
}

function stepFieldHtml(i) {
  return `<div class="ing-form-row">
    <span style="font-weight:700;color:#78350F;font-size:14px;min-width:24px">${i+1}.</span>
    <input class="small-input" style="flex:1" placeholder="Step ${i+1}..." id="f-step-${i}" value="${formSteps[i]||''}" oninput="formSteps[${i}]=this.value">
    ${formSteps.length > 1 ? `<button class="remove-btn" onclick="removeStepField(${i})">×</button>` : ''}
  </div>`;
}

function addIngField() {
  // save current values
  formIngredients.forEach((ing,i) => {
    const a = document.getElementById('f-ing-amt-'+i);
    const b = document.getElementById('f-ing-item-'+i);
    if(a) ing.amount = a.value;
    if(b) ing.item = b.value;
  });
  formIngredients.push({amount:'',item:''});
  document.getElementById('f-ing-list').innerHTML = formIngredients.map((x,i) => ingFieldHtml(i)).join('');
}
function removeIngField(idx) {
  formIngredients.forEach((ing,i) => {
    const a = document.getElementById('f-ing-amt-'+i);
    const b = document.getElementById('f-ing-item-'+i);
    if(a) ing.amount = a.value;
    if(b) ing.item = b.value;
  });
  formIngredients.splice(idx,1);
  document.getElementById('f-ing-list').innerHTML = formIngredients.map((x,i) => ingFieldHtml(i)).join('');
}
function addStepField() {
  formSteps.forEach((s,i) => { const el = document.getElementById('f-step-'+i); if(el) formSteps[i] = el.value; });
  formSteps.push('');
  document.getElementById('f-step-list').innerHTML = formSteps.map((x,i) => stepFieldHtml(i)).join('');
}
function removeStepField(idx) {
  formSteps.forEach((s,i) => { const el = document.getElementById('f-step-'+i); if(el) formSteps[i] = el.value; });
  formSteps.splice(idx,1);
  document.getElementById('f-step-list').innerHTML = formSteps.map((x,i) => stepFieldHtml(i)).join('');
}

function saveRecipe() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Please enter a recipe title'); return; }
  // Sync form values
  formIngredients.forEach((ing,i) => {
    const a = document.getElementById('f-ing-amt-'+i);
    const b = document.getElementById('f-ing-item-'+i);
    if(a) ing.amount = a.value;
    if(b) ing.item = b.value;
  });
  formSteps.forEach((s,i) => { const el = document.getElementById('f-step-'+i); if(el) formSteps[i] = el.value; });

  recipes.push({
    id: nextId++,
    title: title,
    category: document.getElementById('f-category').value,
    prepTime: document.getElementById('f-prep').value,
    cookTime: document.getElementById('f-cook').value,
    servings: parseInt(document.getElementById('f-servings').value) || 4,
    description: document.getElementById('f-desc').value,
    ingredients: formIngredients.filter(i => i.item.trim()),
    steps: formSteps.filter(s => s.trim()),
  });
  showView('home');
}

// ============================================================
//  SHOPPING LIST
// ============================================================
function renderShopping() {
  const el = document.getElementById('view-shopping');
  if (shoppingList.length === 0) {
    // Selection mode
    el.innerHTML = `<div style="padding:0 24px 100px">
      <button class="back-btn" onclick="showView('home')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg> Back
      </button>
      <div style="font-size:26px;font-weight:800;color:#1F2937;margin-bottom:8px;letter-spacing:-0.5px">Shopping List</div>
      <p style="font-size:14px;color:#6B7280;margin-bottom:20px">Select the recipes you want to shop for, then generate your list.</p>
      ${recipes.map(r => {
        const sel = selectedForShopping.has(r.id);
        return `<div class="shop-recipe-card ${sel?'selected':''}" onclick="toggleShopSelect(${r.id})">
          <div class="shop-checkbox ${sel?'checked':''}">${sel?checkSvg():'&nbsp;'}</div>
          <div style="flex:1"><div style="font-weight:600;font-size:14px">${r.title}</div><div style="font-size:12px;color:#9CA3AF">${r.ingredients.length} ingredients</div></div>
        </div>`;
      }).join('')}
      <button class="generate-btn" ${selectedForShopping.size===0?'disabled':''} onclick="buildShoppingList()">
        Generate Shopping List (${selectedForShopping.size} recipe${selectedForShopping.size!==1?'s':''})
      </button>
    </div>`;
  } else {
    // List mode
    const grouped = {};
    shoppingList.forEach((item, idx) => {
      if (!grouped[item.from]) grouped[item.from] = [];
      grouped[item.from].push({...item, idx});
    });
    const total = shoppingList.length;
    const done = checkedShopItems.size;
    const pct = Math.round((done/total)*100);
    el.innerHTML = `<div style="padding:0 24px 100px">
      <button class="back-btn" onclick="showView('home')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg> Back
      </button>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="font-size:26px;font-weight:800;color:#1F2937;letter-spacing:-0.5px">Shopping List</div>
        <span style="font-size:13px;font-weight:600;color:#78350F">${done}/${total} items</span>
      </div>
      <div style="margin-bottom:24px"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${done===total?'#10B981':'#D97706'}"></div></div></div>
      ${Object.entries(grouped).map(([from, items]) => `
        <div style="margin-bottom:20px">
          <div class="shop-from">${from}</div>
          ${items.map(item => {
            const chk = checkedShopItems.has(item.idx);
            return `<div class="shop-item ${chk?'checked':''}" onclick="toggleShopItem(${item.idx})">
              <div class="shop-item-check">${chk?checkSvg():''}</div>
              <span class="shop-item-text"><strong>${item.amount}</strong> ${item.item}</span>
            </div>`;
          }).join('')}
        </div>`).join('')}
      <button class="add-field-btn" style="margin-top:8px" onclick="resetShoppingList()">← Build new list</button>
    </div>`;
  }
  updateShopBadge();
}

function toggleShopSelect(id) {
  if (selectedForShopping.has(id)) selectedForShopping.delete(id); else selectedForShopping.add(id);
  renderShopping();
}

function buildShoppingList() {
  shoppingList = [];
  checkedShopItems = new Set();
  recipes.filter(r => selectedForShopping.has(r.id)).forEach(r => {
    r.ingredients.forEach(ing => shoppingList.push({...ing, from: r.title}));
  });
  renderShopping();
}

function toggleShopItem(idx) {
  if (checkedShopItems.has(idx)) checkedShopItems.delete(idx); else checkedShopItems.add(idx);
  renderShopping();
}

function resetShoppingList() {
  shoppingList = [];
  selectedForShopping = new Set();
  checkedShopItems = new Set();
  renderShopping();
}

function updateShopBadge() {
  const badge = document.getElementById('shop-badge');
  if (selectedForShopping.size > 0) {
    badge.style.display = 'flex';
    badge.textContent = selectedForShopping.size;
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================
//  INIT
// ============================================================
renderHome();
</script>
</body>
